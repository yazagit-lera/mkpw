name: release
on: workflow_dispatch
permissions:
  contents: write

jobs:
  make-release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install libarchive-tools
        run: |
          sudo apt-get update
          sudo apt-get install libarchive-tools

      - name: Delete the old release
        run: gh release delete release --cleanup-tag -y || true
        env:
          GH_TOKEN: ${{ github.token }}

      - name: Make a zipapp
        run: python3 -m zipapp -c -p '/usr/bin/env python3' -o ./mkpw ./zipapp

      - name: Make a zip
        run: zip -9 ./mkpw.zip -- ./LICENSE ./mkpw ./mkpw.cmd
  
      - name: Make a tar.gz
        run: |
          chmod 755 ./mkpw
          bsdtar -b1 -cvf - -- ./LICENSE ./mkpw | gzip -9vc > ./mkpw.tar.gz

      - name: Make the checksums
        run: |
          sha256sum --tag ./mkpw.zip > mkpw.zip.sha256
          sha256sum --tag ./mkpw.tar.gz > mkpw.tar.gz.sha256

      - name: Sign the checksums
        run: |
          gpg_opts='--batch --pinentry-mode loopback --no-tty --yes'
          gpg_sign_opts='--armor --detach-sign --passphrase'
          echo "${GPG_SECRET_KEY}" | gpg ${gpg_opts} --import
          gpg ${gpg_opts} ${gpg_sign_opts} "${GPG_PASSPHRASE}" \
            --output mkpw.zip.sha256.asc mkpw.zip.sha256
          gpg ${gpg_opts} ${gpg_sign_opts} "${GPG_PASSPHRASE}" \
            --output mkpw.tar.gz.sha256.asc mkpw.tar.gz.sha256
        env:
          GPG_SECRET_KEY: ${{ secrets.GPG_SECRET_KEY }}
          GPG_PASSPHRASE: ${{ secrets.GPG_PASSPHRASE }}
 
      - name: Release
        run: |
          gh release create release \
            -n '[GPG public key](https://github.com/nedorazrab0.gpg)'
            ./mkpw.zip ./mkpw.zip.sha256 ./mkpw.zip.sha256.asc ./mkpw.tar.gz \
            ./mkpw.tar.gz.sha256 ./mkpw.tar.gz.sha256.asc
        env:
          GH_TOKEN: ${{ github.token }}
