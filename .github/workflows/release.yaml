name: release
on: workflow_dispatch
permissions:
  contents: write

jobs:
  make-release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install libarchive-tools
        run: |
          sudo apt-get update
          sudo apt-get install libarchive-tools

      - name: Delete the old release
        run: gh release delete release --cleanup-tag -y || true
        env:
          GH_TOKEN: ${{ github.token }}

      - name: Make a zipapp
        run: python3 -m zipapp -c -p '/usr/bin/env python3' -o ./mkpw ./zipapp

      - name: Make a zip
        run: zip -9 ./mkpw.zip -- ./LICENSE ./mkpw ./mkpw.cmd
  
      - name: Make a tar.gz
        run: |
          chmod 755 ./mkpw
          bsdtar -b1 -cvf - -- ./LICENSE ./mkpw | gzip -9vc > ./mkpw.tar.gz

      - name: Make the checksums
        run: |
          sha256sum --tag ./mkpw.zip > mkpw.zip.sha256
          sha256sum --tag ./mkpw.tar.gz > mkpw.tar.gz.sha256

      - name: Release
        run: |
          gh release create release ./mkpw.tar.gz ./mkpw.tar.gz.sha256 \
            ./mkpw.zip ./mkpw.zip.sha256 --generate-notes
        env:
          GH_TOKEN: ${{ github.token }}
